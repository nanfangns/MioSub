name: transcribe-fourth
on:
  workflow_dispatch:
  push:
    branches: ["tmp/asr-fourth-final-20260722"]
    paths:
      - ".github/workflows/transcribe-fourth.yml"
permissions:
  contents: write
jobs:
  transcribe:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Download original audio
        run: |
          curl -L --fail --retry 3 'https://drive.usercontent.google.com/download?id=1wCkRpxVpNpZDZBBJyU5H7S6ykN0TvQTk&export=download&confirm=t' -o fourth_micro.ogg
          ls -lh fourth_micro.ogg
          file fourth_micro.ogg
      - name: Install transcriber
        run: pip install faster-whisper
      - name: Transcribe with word timestamps
        run: python transcribe_fourth.py
      - name: Commit transcript
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add transcript.json transcript.txt
          git commit -m 'Add fourth segment transcript' || exit 0
          git push
