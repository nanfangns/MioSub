name: Transcribe Fourth Audio
on:
  pull_request:
    branches: [main]
  workflow_dispatch:
jobs:
  transcribe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Package uploaded audio chunks for byte comparison
        run: |
          wc -c audio2/p_*
          sha256sum audio2/p_*
          cat audio2/p_* > fourth_audio.b64
          wc -c fourth_audio.b64
          sha256sum fourth_audio.b64
      - uses: actions/upload-artifact@v4
        with:
          name: uploaded-audio-chunks
          path: audio2/
