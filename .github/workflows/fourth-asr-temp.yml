name: fourth-asr-temp
on:
  pull_request:
    branches: [main]
permissions:
  contents: read
jobs:
  asr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Diagnose first audio chunk transfer
        run: |
          git fetch origin tmp/asr-fourth-final-20260722:refs/remotes/origin/tmp/asr-fourth-final-20260722
          git show origin/tmp/asr-fourth-final-20260722:asr_short/chunk0.b64 | tr -d '\r\n' > chunk0.b64
          {
            wc -c chunk0.b64
            sha256sum chunk0.b64
            base64 -d chunk0.b64 > chunk0.ogg || true
            wc -c chunk0.ogg
            sha256sum chunk0.ogg
            file chunk0.ogg
          } > chunk0-diagnostics.txt 2>&1
          cat chunk0-diagnostics.txt
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: chunk0-diagnostics
          path: chunk0-diagnostics.txt
