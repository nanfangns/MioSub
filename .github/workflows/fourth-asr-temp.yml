name: fourth-asr-temp
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
permissions:
  contents: read
jobs:
  asr:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.11'}
      - name: Reconstruct verified first original-audio chunk
        run: |
          git fetch origin tmp/asr-fourth-final-20260722:refs/remotes/origin/tmp/asr-fourth-final-20260722
          git show origin/tmp/asr-fourth-final-20260722:asr_short/chunk0.b64 | tr -d '\r\n' > chunk0.b64
          test $(wc -c < chunk0.b64) -eq 13308
          base64 -d chunk0.b64 > chunk0.ogg
          echo '8f8e64e11c86375fe68d42e848874825632edd168d422a03b9da42e1eee89d30  chunk0.ogg' | sha256sum -c -
          ffprobe -v error -show_entries format=duration -of default=nw=1 chunk0.ogg
      - name: Install Whisper
        run: pip install faster-whisper
      - name: Transcribe first chunk with word timestamps
        run: |
          cat > /tmp/asr.py <<'PY'
          from pathlib import Path
          import json
          from faster_whisper import WhisperModel
          m=WhisperModel('small',device='cpu',compute_type='int8')
          segs,info=m.transcribe('chunk0.ogg',language='zh',beam_size=5,vad_filter=True,word_timestamps=True,initial_prompt='智慧体育体测分析与训练指导智能体，体测，BMI，坐位体前屈，Word，DOCX，知识库，训练建议，体育中考')
          out=[]
          for s in segs: out.append({'start':round(s.start,3),'end':round(s.end,3),'text':s.text.strip(),'words':[{'start':round(w.start,3) if w.start is not None else None,'end':round(w.end,3) if w.end is not None else None,'word':w.word} for w in (s.words or [])]})
          Path('chunk0-transcript.json').write_text(json.dumps({'language':info.language,'duration':info.duration,'segments':out},ensure_ascii=False,indent=2),encoding='utf-8')
          Path('chunk0-transcript.txt').write_text('\n'.join(f"[{s['start']:.3f} --> {s['end']:.3f}] {s['text']}" for s in out),encoding='utf-8')
          PY
          python /tmp/asr.py > asr.log 2>&1
          cat asr.log
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: fourth-chunk0-transcript
          if-no-files-found: warn
          path: |
            chunk0-transcript.json
            chunk0-transcript.txt
            asr.log
