name: fourth-asr-temp
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
permissions:
  contents: read
jobs:
  asr:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.11'}
      - name: Reconstruct and verify original audio
        run: |
          set +e
          {
            git fetch origin tmp/asr-fourth-final-20260722:refs/remotes/origin/tmp/asr-fourth-final-20260722
            for i in 00 01 02 03 04 05 06 07; do
              echo "part${i}: $(git show origin/tmp/asr-fourth-final-20260722:asr_audio/part${i}.txt | wc -c) bytes"
              git show origin/tmp/asr-fourth-final-20260722:asr_audio/part${i}.txt
            done > fourth_micro.b64
            echo "combined: $(wc -c < fourth_micro.b64) bytes"
            sha256sum fourth_micro.b64
            base64 -d fourth_micro.b64 > fourth_micro.ogg
            echo "decoded: $(wc -c < fourth_micro.ogg) bytes"
            sha256sum fourth_micro.ogg
            file fourth_micro.ogg
            ffprobe -v error -show_entries format=duration -of default=nw=1 fourth_micro.ogg
          } > reconstruct.log 2>&1
          cat reconstruct.log
          test $(wc -c < fourth_micro.b64) -eq 51780
          echo '174a52464bf2ebec7845a68127258e715c50b8f0726adc2d8913956bf24a922b  fourth_micro.b64' | sha256sum -c -
          echo 'cf121638a9bbbc0eb74566af3d5e8a8a181f7a6de5622cbdc2620af9f8584c9a  fourth_micro.ogg' | sha256sum -c -
      - name: Install Whisper
        run: pip install faster-whisper
      - name: Transcribe with word timestamps
        run: |
          cat > /tmp/asr.py <<'PY'
          from pathlib import Path
          import json
          from faster_whisper import WhisperModel
          m=WhisperModel('small',device='cpu',compute_type='int8')
          segs,info=m.transcribe('fourth_micro.ogg',language='zh',beam_size=5,vad_filter=True,word_timestamps=True,initial_prompt='智慧体育体测分析与训练指导智能体，体测，BMI，坐位体前屈，Word，DOCX，知识库，训练建议，体育中考')
          out=[]
          for s in segs: out.append({'start':round(s.start,3),'end':round(s.end,3),'text':s.text.strip(),'words':[{'start':round(w.start,3) if w.start is not None else None,'end':round(w.end,3) if w.end is not None else None,'word':w.word} for w in (s.words or [])]})
          Path('fourth-transcript.json').write_text(json.dumps({'language':info.language,'duration':info.duration,'segments':out},ensure_ascii=False,indent=2),encoding='utf-8')
          Path('fourth-transcript.txt').write_text('\n'.join(f"[{s['start']:.3f} --> {s['end']:.3f}] {s['text']}" for s in out),encoding='utf-8')
          PY
          set +e
          python /tmp/asr.py > asr.log 2>&1
          code=$?
          cat asr.log
          exit $code
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: fourth-transcript-debug
          if-no-files-found: warn
          path: |
            fourth-transcript.json
            fourth-transcript.txt
            asr.log
            reconstruct.log
            fourth_micro.b64
